# XML option hints
tools_xml_indent_hint: "Spaces per nesting level. Applies to the formatted XML and JSON output."
tools_xml_minify_hint: "Collapse the output onto a single compact line. Applies to the XML and JSON output."
tools_xml_sort_attrs_hint: "Order each element's attributes alphabetically. Applies to the XML and JSON output."
tools_xml_preserve_comments_hint: "Keep XML comments in the formatted output. The JSON output always drops them."

# JSON option hints
tools_json_indent_hint: "Spaces per nesting level. Applies to the JSON, XML, and YAML output."
tools_json_minify_hint: "Collapse the output onto a single compact line. Applies to the JSON and XML output."
tools_json_sort_keys_hint: "Order object keys alphabetically. Applies to every output format."
tools_json_escape_unicode_hint: "Escape non-ASCII characters as \\uXXXX. Applies to the JSON output."
tools_json_remove_null_hint: "Drop keys whose value is null. Applies to every output format."

# Base64 option hints
tools_b64_urlsafe_hint: "Use the URL-safe alphabet (- and _) and drop padding. Applies to the encoded output; decoding accepts both alphabets."

# UUID option hints
tools_uuid_uppercase_hint: "Render hex digits in uppercase. Applies to the UUID and Hex views."
tools_uuid_hyphens_hint: "Keep the canonical hyphens. Applies to the UUID view."
tools_uuid_braces_hint: "Wrap the value in curly braces. Applies to every view."
tools_uuid_quotes_hint: "Wrap the value in double quotes. Applies to every view."
tools_uuid_generate_hint: "Generate a fresh random UUID v4."

# Text Compare option hints
tools_compare_hint: "Compare the two texts and highlight the differences."
tools_case_sensitive_hint: "Treat uppercase and lowercase as different characters when comparing."
tools_ignore_whitespace_hint: "Strip all whitespace before comparing, so spacing differences are ignored."
tools_ignore_empty_lines_hint: "Drop blank lines from both texts before comparing."
tools_trim_lines_hint: "Remove leading and trailing whitespace from each line before comparing."
tools_ignore_punctuation_hint: "Strip punctuation and symbols before comparing."

# Crypto option hints
tools_crypto_algorithm_hint: "Hashing algorithm. MD5 and SHA-1 are kept for legacy interop only, never for security."
tools_crypto_uppercase_hint: "Render the hex digest in uppercase. Applies to the Hex encoding only."
tools_crypto_wrap_hint: "Wrap the digest onto multiple lines instead of scrolling it horizontally."
tools_crypto_hmac_hint: "Provide a secret key to compute HMAC-<algorithm> instead of a plain digest. Leave empty for a plain hash."
